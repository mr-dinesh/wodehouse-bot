name: Post Wodehouse Quote

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC — morning
    - cron: '0 17 * * *'  # 17:00 UTC — evening
  workflow_dispatch:        # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: wodehouse-bot-post
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post quote
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: python bot.py

      - name: Commit posted history
        run: |
          git config user.name "wodehouse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posted.json
          if git diff --cached --quiet; then
            echo "Nothing to commit — posted.json unchanged."
            exit 0
          fi
          git commit -m "chore: update posted history"
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed (attempt ${attempt}/3); pulling with rebase..."
            git pull --rebase
          done
          echo "ERROR: all 3 push attempts failed — posted history not saved."
          exit 1

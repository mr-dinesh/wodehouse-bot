name: Post Wodehouse Quote

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC — morning
    - cron: '0 17 * * *'  # 17:00 UTC — evening
  workflow_dispatch:        # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post quote
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: python bot.py

      - name: Commit posted history
        run: |
          git config user.name "wodehouse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posted.json
          git diff --cached --quiet || git commit -m "chore: update posted history"
          git push
